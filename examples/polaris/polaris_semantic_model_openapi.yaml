openapi: 3.1.0
info:
  title: Apache Polaris Semantic Model API Sketch
  version: 0.1.0
  description: >
    Non-normative sketch for registering Open Semantic Interchange models and
    QueryGraph AI Navigator bundles as governed Polaris catalog metadata.
paths:
  /api/catalogs/{catalog}/namespaces/{namespace}/semantic-models:
    post:
      summary: Register a semantic model in a namespace.
      operationId: createSemanticModel
      parameters:
        - $ref: '#/components/parameters/Catalog'
        - $ref: '#/components/parameters/Namespace'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SemanticModelRegistration'
      responses:
        '201':
          description: Registered semantic model.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SemanticModelRegistration'
  /api/catalogs/{catalog}/namespaces/{namespace}/semantic-models/{name}:
    get:
      summary: Load a semantic model.
      operationId: getSemanticModel
      parameters:
        - $ref: '#/components/parameters/Catalog'
        - $ref: '#/components/parameters/Namespace'
        - $ref: '#/components/parameters/Name'
      responses:
        '200':
          description: Semantic model.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SemanticModelRegistration'
    put:
      summary: Replace a semantic model.
      operationId: replaceSemanticModel
      parameters:
        - $ref: '#/components/parameters/Catalog'
        - $ref: '#/components/parameters/Namespace'
        - $ref: '#/components/parameters/Name'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SemanticModelRegistration'
      responses:
        '200':
          description: Replaced semantic model.
    delete:
      summary: Drop a semantic model.
      operationId: deleteSemanticModel
      parameters:
        - $ref: '#/components/parameters/Catalog'
        - $ref: '#/components/parameters/Namespace'
        - $ref: '#/components/parameters/Name'
      responses:
        '204':
          description: Deleted.
  /api/catalogs/{catalog}/namespaces/{namespace}/semantic-models/{name}:validate:
    post:
      summary: Validate target references, format, and policy envelope.
      operationId: validateSemanticModel
      parameters:
        - $ref: '#/components/parameters/Catalog'
        - $ref: '#/components/parameters/Namespace'
        - $ref: '#/components/parameters/Name'
      responses:
        '200':
          description: Validation result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationResult'
  /api/catalogs/{catalog}/namespaces/{namespace}/semantic-models/{name}:compile:
    post:
      summary: Ask an external compiler to compile the semantic model.
      operationId: compileSemanticModel
      parameters:
        - $ref: '#/components/parameters/Catalog'
        - $ref: '#/components/parameters/Namespace'
        - $ref: '#/components/parameters/Name'
      responses:
        '200':
          description: Compiler-specific result.
components:
  parameters:
    Catalog:
      name: catalog
      in: path
      required: true
      schema:
        type: string
    Namespace:
      name: namespace
      in: path
      required: true
      schema:
        type: string
    Name:
      name: name
      in: path
      required: true
      schema:
        type: string
  schemas:
    SemanticModelRegistration:
      type: object
      required:
        - name
        - resourceType
        - format
        - target
      properties:
        name:
          type: string
        resourceType:
          const: SemanticModel
        format:
          type: string
          enum:
            - open-semantic-interchange
            - querygraph-ai-navigator-jsonld
            - mlcommons-croissant
            - codata-cdif
            - w3c-odrl
            - w3c-did
        formatVersion:
          type: string
        target:
          type: object
          properties:
            type:
              type: string
              enum:
                - iceberg-table
                - iceberg-view
                - namespace
                - catalog
                - external-asset
            identifier:
              type: string
            snapshotId:
              type: string
            schemaId:
              type: string
        semanticModel:
          type: object
          additionalProperties: true
        querygraphBundle:
          type: object
          additionalProperties: true
        lineage:
          type: object
          additionalProperties: true
        policyHints:
          type: object
          additionalProperties: true
    ValidationResult:
      type: object
      required:
        - valid
      properties:
        valid:
          type: boolean
        errors:
          type: array
          items:
            type: string
        warnings:
          type: array
          items:
            type: string

